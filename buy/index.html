<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERFAMO DELIVERY PRICE</title>
<style>
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --text: #242424;
  --muted: #70666a;
  --border: #e2e2e6;
  --brand: #b848b8;
  --brand-dark: #8f348f;
  --mauve: #957373;
  --blue: #1a73e8;
  --green: #2ca668;
  --red: #cd4e4e;
  --new-row: #ffe2e2;
  --row-hover: #dce6f4;
  --toolbar-height: 0px;
  --fixed-toolbar-top: 0px;
  --sticky-table-gap: 0px;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: auto;
}

body {
  min-width: 320px;
  margin: 0;
  padding: 24px 0 32px;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  overflow-y: scroll;
}

.page-shell {
  width: calc(100% - 32px);
  max-width: 1240px;
  margin: 0 auto;
}

.site-header {
  position: relative;
  display: grid;
  justify-items: center;
  gap: 14px;
}

.logout-link {
  position: absolute;
  top: 0;
  right: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
}

.logout-link:hover,
.logout-link:focus {
  border-color: var(--mauve);
  color: var(--text);
  outline: none;
}

.brand-logo {
  display: inline-flex;
  width: min(340px, 72vw);
}

.brand-logo img {
  display: block;
  width: 100%;
  height: auto;
}

.status-strip {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
}

.status-item {
  min-width: 0;
  padding: 6px 8px;
  text-align: center;
  border-right: 1px solid var(--border);
}

.status-item:last-child {
  border-right: 0;
}

.status-label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

.status-value {
  display: block;
  margin-top: 3px;
  font-size: 16px;
  font-weight: 700;
  overflow-wrap: break-word;
}

.content-wrapper {
  margin-top: 16px;
  min-height: calc(100vh + 24px);
}

.sticky-toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: grid;
  gap: 12px;
  width: 100%;
  padding: 10px 0 12px;
  background: var(--bg);
}

body.toolbar-fixed .content-wrapper {
  padding-top: var(--toolbar-height);
}

body.toolbar-fixed .sticky-toolbar {
  position: fixed;
  top: var(--fixed-toolbar-top);
  left: 50%;
  width: calc(100% - 32px);
  max-width: 1240px;
  transform: translateX(-50%);
}

.search-row {
  display: grid;
  grid-template-columns: minmax(280px, 430px);
  justify-content: center;
  align-items: center;
  gap: 14px;
}

.search-container {
  position: relative;
  min-width: 0;
}

#search {
  display: block;
  width: 100%;
  height: 42px;
  padding: 10px 42px 10px 16px;
  border: 2px solid #d2d2d8;
  border-radius: 8px;
  outline: none;
  background: var(--surface);
  color: var(--text);
  font-size: 16px;
}

#search:focus {
  border-color: var(--mauve);
}

.clear-search {
  position: absolute;
  top: 50%;
  right: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  background: var(--mauve);
  color: #ffffff;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transform: translateY(-50%);
}

.sheet-tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.sheet-tab {
  min-height: 34px;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
}

.sheet-tab:hover {
  border-color: var(--mauve);
}

.sheet-tab.is-active {
  border-color: var(--mauve);
  background: var(--mauve);
  color: #ffffff;
}

.table-wrapper {
  width: 100%;
  overflow: visible;
  border-radius: 8px;
  background: var(--surface);
  box-shadow: 0 12px 30px rgba(34, 34, 34, 0.07);
  -webkit-overflow-scrolling: touch;
}

.table-wrapper.is-hidden {
  display: none;
}

.letter-nav {
  position: fixed;
  top: 220px;
  right: 10px;
  z-index: 70;
  display: none;
  max-height: calc(100vh - 240px);
  padding: 4px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 8px 22px rgba(34, 34, 34, 0.12);
  overflow-y: auto;
}

.letter-nav.is-visible {
  display: grid;
  gap: 4px;
}

.letter-button {
  width: 24px;
  height: 21px;
  padding: 0;
  border: 0;
  border-radius: 5px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
}

.letter-button:hover,
.letter-button.is-active {
  background: var(--mauve);
  color: #ffffff;
}

.table-status {
  display: none;
  margin-top: 12px;
  padding: 14px 16px;
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  text-align: center;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(34, 34, 34, 0.05);
}

.table-status.is-visible {
  display: block;
}

.table-status.error {
  color: var(--red);
}

.table-status.success {
  color: var(--green);
}

table {
  width: 100%;
  min-width: 1180px;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

col.code-col {
  width: 9%;
}

col.barcode-col {
  width: 12%;
}

col.name-col {
  width: 32%;
}

col.small-col {
  width: 8%;
}

col.price-col {
  width: 9%;
}

col.delivery-col {
  width: 10%;
}

th,
td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  vertical-align: middle;
}

th {
  position: sticky;
  top: 0;
  z-index: 90;
  background: var(--mauve);
  color: #ffffff;
  font-size: 13px;
  line-height: 1.25;
  text-transform: uppercase;
}

body.toolbar-fixed th {
  top: calc(var(--fixed-toolbar-top) + var(--toolbar-height) + var(--sticky-table-gap));
}

th.sortable {
  cursor: pointer;
  user-select: none;
}

.sort-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.sort-indicator {
  font-size: 12px;
  line-height: 1;
  opacity: 0.85;
}

td {
  font-size: 14px;
  line-height: 1.35;
  overflow-wrap: break-word;
}

tbody tr:hover {
  background: var(--row-hover);
}

tbody tr.is-new-row {
  background: var(--new-row);
}

tbody tr.is-new-row:hover {
  background: #ffd4d4;
}

tbody tr {
  cursor: pointer;
}

tbody tr.selected-row {
  background: #cfd8f4;
}

.name-cell {
  font-weight: 700;
}

.price-cell,
.code-cell {
  font-variant-numeric: tabular-nums;
}

.delivery-pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 4px 8px;
  border-radius: 5px;
  background: #f1ebef;
  color: #4b3d42;
  font-weight: 700;
  white-space: nowrap;
}

mark {
  padding: 0 2px;
  border-radius: 3px;
  background: #ffe28a;
  color: inherit;
}

.state-cell {
  padding: 34px 18px;
  color: var(--muted);
  text-align: center;
  font-weight: 700;
  height: 220px;
}

.state-cell.error {
  color: var(--red);
}

.scroll-to-top {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 80;
  display: none;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border: 0;
  border-radius: 50%;
  background: var(--mauve);
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(34, 34, 34, 0.18);
}

.scroll-to-top.show {
  display: flex;
}

.scroll-to-top svg {
  width: 22px;
  height: 22px;
}

@media (max-width: 760px) {
  body {
    padding-top: 16px;
  }

  .page-shell {
    width: calc(100% - 20px);
  }

  body.toolbar-fixed .sticky-toolbar {
    width: calc(100% - 20px);
  }

  .status-strip {
    grid-template-columns: 1fr;
  }

  .status-item {
    border-right: 0;
    border-bottom: 1px solid var(--border);
  }

  .status-item:last-child {
    border-bottom: 0;
  }

  .search-row {
    grid-template-columns: 1fr;
  }

  .search-container {
    grid-column: 1;
  }

  .logout-link {
    position: static;
    order: 2;
    margin-top: -4px;
  }

  .letter-nav {
    right: 6px;
    top: 180px;
    max-height: calc(100vh - 200px);
  }
}
</style>
</head>
<body>
<main class="page-shell">
  <header class="site-header">
    <a class="brand-logo" href="#" aria-label="PERFAMO">
      <img src="../logo.png" alt="PERFAMO">
    </a>
    <a id="logoutLink" class="logout-link" href="/cdn-cgi/access/logout">Вийти</a>
    <section class="status-strip" aria-label="Стан прайсу">
      <div class="status-item">
        <span class="status-label">Пошук</span>
        <span id="activeSheet" class="status-value">Усі прайси</span>
      </div>
      <div class="status-item">
        <span class="status-label">Оновлено</span>
        <span id="updatedAt" class="status-value">...</span>
      </div>
      <div class="status-item">
        <span class="status-label">Завантажено</span>
        <span id="loadedCount" class="status-value">...</span>
      </div>
    </section>
  </header>

  <section class="content-wrapper">
    <div class="sticky-toolbar">
      <div class="search-row">
        <div class="search-container">
          <input type="text" id="search" placeholder="Пошук аромату..." autocomplete="off">
          <button id="clearSearch" class="clear-search" aria-label="Очистити пошук">&times;</button>
        </div>
      </div>
      <div id="sheetTabs" class="sheet-tabs" aria-label="Прайси"></div>
    </div>

    <div id="tableStatus" class="table-status" aria-live="polite"></div>

    <div class="table-wrapper">
      <table>
        <colgroup>
          <col class="code-col">
          <col class="barcode-col">
          <col class="name-col">
          <col class="small-col">
          <col class="small-col">
          <col class="small-col">
          <col class="small-col">
          <col class="price-col">
          <col class="price-col">
          <col class="delivery-col">
        </colgroup>
        <thead>
          <tr>
            <th>Код</th>
            <th>Штрихкод</th>
            <th>Назва парфуму</th>
            <th>Тестер</th>
            <th>Тип</th>
            <th>Вид</th>
            <th>Об'єм</th>
            <th id="priceUsdHeader" class="sortable" aria-sort="none">
              <span class="sort-label">Ціна в USD <span id="priceUsdSortIndicator" class="sort-indicator">↕</span></span>
            </th>
            <th>Ціна в грн</th>
            <th>Доставка</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</main>

<nav id="letterNav" class="letter-nav" aria-label="Швидкий перехід за першою літерою"></nav>

<button id="scrollToTopBtn" class="scroll-to-top" aria-label="Повернутися вгору">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const BUY_API_URL = window.PERFAMO_BUY_API_URL || '/api/buy-data';
  const SHEETS = [
    { id: 'delivery-3-6', label: '3-6 днів', sheetName: 'Доставка 3-6 днів', delivery: '3-6 днів' },
    { id: 'delivery-3-7', label: '3-7 днів', sheetName: 'Доставка 3-7 днів', delivery: '3-7 днів' },
    { id: 'delivery-7-15', label: '7-15 днів', sheetName: 'Доставка 7-15 днів', delivery: '7-15 днів' },
    { id: 'delivery-5-10', label: '5-10 днів', sheetName: 'Доставка 5-10 днів', delivery: '5-10 днів' },
    { id: 'delivery-3-5', label: '3-5 днів', sheetName: 'Доставка 3-5 днів', delivery: '3-5 днів' },
    { id: 'delivery-10-30', label: '10-30 днів', sheetName: 'Доставка 10-30 днів', delivery: '10-30 днів' }
  ];
  const ALL_TAB = { id: 'all', label: 'ВСІ' };
  const NEW_TAB = { id: 'new', label: 'Новинки' };
  const NEW_TAB_SOURCE_IDS = new Set(['delivery-3-6', 'delivery-3-5']);
  const DISCOUNT_SOURCE_IDS = new Set(['delivery-3-6', 'delivery-3-7', 'delivery-7-15', 'delivery-3-5']);
  const DISPLAY_DISCOUNT_RATE = 0.05;

  const tableBody = document.getElementById('tableBody');
  const searchInput = document.getElementById('search');
  const clearSearchBtn = document.getElementById('clearSearch');
  const sheetTabs = document.getElementById('sheetTabs');
  const priceUsdHeader = document.getElementById('priceUsdHeader');
  const priceUsdSortIndicator = document.getElementById('priceUsdSortIndicator');
  const activeSheetLabel = document.getElementById('activeSheet');
  const updatedAt = document.getElementById('updatedAt');
  const loadedCount = document.getElementById('loadedCount');
  const scrollBtn = document.getElementById('scrollToTopBtn');
  const letterNav = document.getElementById('letterNav');
  const stickyToolbar = document.querySelector('.sticky-toolbar');
  const contentWrapper = document.querySelector('.content-wrapper');
  const tableWrapper = document.querySelector('.table-wrapper');
  const tableStatus = document.getElementById('tableStatus');
  const logoutLink = document.getElementById('logoutLink');

  let allRows = [];
  let availableSheets = [];
  let lastQuery = '';
  const MIN_SEARCH_LENGTH = 2;
  const PAGE_SIZE = 50;
  let currentResults = [];
  let renderedCount = 0;
  let activeTab = SHEETS[0].id;
  let wasSearchActive = false;
  let priceSortDirection = null;
  let activeLetter = '';
  const scrollMemory = new Map();
  let shouldRestoreScroll = false;

  if (logoutLink) {
    logoutLink.addEventListener('click', event => {
      event.preventDefault();
      logoutLink.textContent = 'Вихід...';
      logoutLink.setAttribute('aria-disabled', 'true');

      const frame = document.createElement('iframe');
      frame.src = logoutLink.href;
      frame.style.display = 'none';
      document.body.appendChild(frame);

      window.setTimeout(() => {
        window.location.href = '/buy/';
      }, 1400);
    });
  }

  window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('show', window.scrollY > 300);
    updateFixedToolbar();
  });

  function getViewportTop() {
    return window.visualViewport ? window.visualViewport.offsetTop : 0;
  }

  function isToolbarAtViewportTop() {
    if (!contentWrapper) return false;
    return contentWrapper.getBoundingClientRect().top <= getViewportTop() + 1;
  }

  function updateStickyHeader() {
    const toolbarHeight = stickyToolbar ? stickyToolbar.getBoundingClientRect().height : 0;
    document.documentElement.style.setProperty('--toolbar-height', `${Math.max(0, toolbarHeight)}px`);
  }

  function updateFixedToolbar() {
    const viewportTop = Math.max(0, getViewportTop());
    const shouldBeFixed = isToolbarAtViewportTop();
    document.documentElement.style.setProperty('--fixed-toolbar-top', `${shouldBeFixed ? viewportTop : 0}px`);
    document.body.classList.toggle('toolbar-fixed', shouldBeFixed);
    updateStickyHeader();
  }

  window.addEventListener('resize', updateFixedToolbar);

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateFixedToolbar);
    window.visualViewport.addEventListener('scroll', updateFixedToolbar);
  }

  updateFixedToolbar();

  scrollBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'auto' });
  });

  function normalize(text) {
    return String(text || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[’'`´ʼʹ]/g, '')
      .replace(/ß/g, 'ss')
      .replace(/æ/g, 'ae')
      .replace(/œ/g, 'oe')
      .replace(/ø/g, 'o')
      .replace(/đ/g, 'd')
      .replace(/ł/g, 'l')
      .replace(/&/g, ' and ')
      .replace(/№/g, ' no ')
      .replace(/[^a-zа-яіїєґ0-9]+/gi, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function uniqueWords(text) {
    return [...new Set(normalize(text).split(/\s+/).filter(Boolean))];
  }

  const SEARCH_ALIASES = [
    ['d g', 'dg', 'dolce gabbana', 'dolce and gabbana'],
    ['ysl', 'yves saint laurent'],
    ['giorgio armani', 'armani'],
    ['acqua di gio', 'acqua di giò', 'aqua di gio', 'aqua di giò'],
    ['si', 'sì'],
    ['kirke', 'kirké'],
    ['molecule', 'molecules', 'molecule escentric', 'escentric molecules'],
    ['baccarat rouge', 'bakara', 'bacara'],
    ['oud', 'oudh'],
    ['extrait', 'extract'],
    ['edp', 'eau de parfum', 'парфумована вода', 'парфюмированная вода'],
    ['edt', 'eau de toilette', 'туалетна вода', 'туалетная вода'],
    ['tester', 'тестер'],
    ['unisex', 'унісекс', 'унисекс', 'унів'],
    ['woman', 'women', 'жін', 'жіночі', 'женские'],
    ['man', 'men', 'чол', 'чоловічі', 'мужские']
  ];

  function buildSearchText(...parts) {
    const base = normalize(parts.filter(Boolean).join(' '));
    const tokens = new Set(base.split(/\s+/).filter(Boolean));
    const expanded = [base];

    SEARCH_ALIASES.forEach(group => {
      const variants = group.map(normalize).filter(Boolean);
      const matched = variants.some(variant => {
        const words = variant.split(/\s+/).filter(Boolean);
        return words.length && words.every(word => tokens.has(word));
      });

      if (matched) {
        variants.forEach(variant => expanded.push(variant));
      }
    });

    return normalize(expanded.join(' '));
  }

  function escapeHTML(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function highlight(value) {
    const text = escapeHTML(value);
    if (!lastQuery) return text;

    const words = lastQuery
      .split(/\s+/)
      .filter(Boolean)
      .map(word => word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));

    if (!words.length) return text;
    return text.replace(new RegExp(`(${words.join('|')})`, 'gi'), '<mark>$1</mark>');
  }

  function cellValue(cells, index) {
    if (index < 0) return '';
    const cell = cells[index];
    if (!cell) return '';
    if (cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
    if (cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
    return '';
  }

  function parseMoney(value) {
    const normalized = String(value || '')
      .replace(/\s+/g, '')
      .replace(',', '.')
      .replace(/[^\d.-]/g, '');
    const number = Number.parseFloat(normalized);
    return Number.isFinite(number) ? number : null;
  }

  function formatMoney(value) {
    if (!Number.isFinite(value)) return '';
    return value.toFixed(2).replace('.', ',');
  }

  function discountedMoney(value, shouldDiscount) {
    const number = parseMoney(value);
    if (number === null) return String(value || '');
    return formatMoney(shouldDiscount ? number * (1 - DISPLAY_DISCOUNT_RATE) : number);
  }

  function firstNameLetter(value) {
    const match = String(value || '').trim().match(/[A-Za-z]/);
    return match ? match[0].toUpperCase() : '';
  }

  function headerKey(value) {
    return normalize(value)
      .replace(/[^a-zа-яіїєґ0-9]/gi, '');
  }

  function columnMap(table) {
    const map = {};
    (table.cols || []).forEach((column, index) => {
      const key = headerKey(column.label || '');
      if (key) map[key] = index;
    });

    return {
      code: map['код'] ?? 0,
      barcode: map['штрихкод'] ?? -1,
      name: map['назвапарфуму'] ?? 1,
      tester: map['тестер'] ?? -1,
      type: map['тип'] ?? -1,
      kind: map['вид'] ?? -1,
      volume: map['обєм'] ?? map['обʼєм'] ?? -1,
      priceUsd: map['цінавusd'] ?? 2,
      priceUah: map['цінавгрн'] ?? 4,
      rate: map['курс'] ?? 5,
      isNew: map['новинка'] ?? -1
    };
  }

  function tableToRows(sheet, response) {
    if (!response || response.status !== 'ok' || !response.table) {
      return { rows: [], error: true };
    }

    const rows = [];
    const rawRows = response.table.rows || [];
    const columns = columnMap(response.table);
    const rateRow = rawRows.find(row => cellValue(row.c || [], columns.rate));
    const defaultRate = rateRow ? cellValue(rateRow.c || [], columns.rate) : '';

    rawRows.forEach(row => {
      const cells = row.c || [];
      const code = cellValue(cells, columns.code);
      const barcode = cellValue(cells, columns.barcode);
      const name = cellValue(cells, columns.name);
      const tester = cellValue(cells, columns.tester);
      const type = cellValue(cells, columns.type);
      const kind = cellValue(cells, columns.kind);
      const volume = cellValue(cells, columns.volume);
      const sourcePriceUsd = cellValue(cells, columns.priceUsd);
      const sourcePriceUah = cellValue(cells, columns.priceUah);
      const rate = cellValue(cells, columns.rate) || defaultRate;
      const isNew = Boolean(cellValue(cells, columns.isNew));
      const shouldDiscount = DISCOUNT_SOURCE_IDS.has(sheet.id);
      const priceUsd = discountedMoney(sourcePriceUsd, shouldDiscount);
      const priceUah = discountedMoney(sourcePriceUah, shouldDiscount);

      if (!code || !name || !sourcePriceUsd) return;

      rows.push({
        sheetId: sheet.id,
        sheetLabel: sheet.label,
        sourceSheet: sheet.sheetName,
        delivery: sheet.delivery,
        code,
        barcode,
        name,
        tester,
        type,
        kind,
        volume,
        priceUsd,
        priceUsdNumber: parseMoney(priceUsd),
        priceUah,
        rate,
        isNew,
        isDiscounted: shouldDiscount,
        firstLetter: firstNameLetter(name),
        searchText: buildSearchText(code, barcode, name, tester, type, kind, volume, priceUsd, priceUah, sheet.delivery),
        copyText: [code, barcode, name, tester, type, kind, volume, sourcePriceUsd].join('\t')
      });
    });

    return { rows, error: false };
  }

  function apiRowsToRows(sheet, sourceRows) {
    const rows = [];
    const shouldDiscount = DISCOUNT_SOURCE_IDS.has(sheet.id);

    (sourceRows || []).forEach(row => {
      const code = String(row.code || '').trim();
      const barcode = String(row.barcode || '').trim();
      const name = String(row.name || '').trim();
      const tester = String(row.tester || '').trim();
      const type = String(row.type || '').trim();
      const kind = String(row.kind || '').trim();
      const volume = String(row.volume || '').trim();
      const sourcePriceUsd = String(row.priceUsd || '').trim();
      const sourcePriceUah = String(row.priceUah || '').trim();
      const rate = String(row.rate || '').trim();
      const isNew = Boolean(row.isNew);
      const priceUsd = discountedMoney(sourcePriceUsd, shouldDiscount);
      const priceUah = discountedMoney(sourcePriceUah, shouldDiscount);

      if (!code || !name || !sourcePriceUsd) return;

      rows.push({
        sheetId: sheet.id,
        sheetLabel: sheet.label,
        sourceSheet: sheet.sheetName,
        delivery: sheet.delivery,
        code,
        barcode,
        name,
        tester,
        type,
        kind,
        volume,
        priceUsd,
        priceUsdNumber: parseMoney(priceUsd),
        priceUah,
        rate,
        isNew,
        isDiscounted: shouldDiscount,
        firstLetter: firstNameLetter(name),
        searchText: buildSearchText(code, barcode, name, tester, type, kind, volume, priceUsd, priceUah, sheet.delivery),
        copyText: [code, barcode, name, tester, type, kind, volume, sourcePriceUsd].join('\t')
      });
    });

    return rows;
  }

  function renderState(message, tone = 'neutral') {
    tableBody.innerHTML = '';
    tableWrapper.classList.add('is-hidden');
    tableStatus.textContent = message;
    tableStatus.className = `table-status is-visible ${tone === 'error' ? 'error' : ''}`;
  }

  function formatCount(count) {
    return `${count} позицій`;
  }

  function isSearchActive() {
    return normalize(searchInput.value).length >= MIN_SEARCH_LENGTH;
  }

  function tabItems() {
    return isSearchActive() ? [ALL_TAB, ...SHEETS, NEW_TAB] : [...SHEETS, NEW_TAB];
  }

  function activeTabLabel() {
    const tab = tabItems().find(item => item.id === activeTab);
    return tab ? tab.label : SHEETS[0].label;
  }

  function renderTabs() {
    const tabs = tabItems();
    const validIds = new Set(tabs.map(tab => tab.id));
    if (!validIds.has(activeTab)) {
      activeTab = tabs[0].id;
    }

    sheetTabs.innerHTML = '';
    const fragment = document.createDocumentFragment();

    tabs.forEach(tab => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `sheet-tab${tab.id === activeTab ? ' is-active' : ''}`;
      button.dataset.tab = tab.id;
      button.textContent = tab.label;
      fragment.appendChild(button);
    });

    sheetTabs.appendChild(fragment);
    updateFixedToolbar();
  }

  function updateStatus(rows) {
    activeSheetLabel.textContent = activeTabLabel();
    loadedCount.textContent = `${availableSheets.length} / ${SHEETS.length} прайсів`;
  }

  function updateSortHeader() {
    if (!priceSortDirection) {
      priceUsdHeader.setAttribute('aria-sort', 'none');
      priceUsdSortIndicator.textContent = '↕';
      return;
    }

    priceUsdHeader.setAttribute('aria-sort', priceSortDirection === 'asc' ? 'ascending' : 'descending');
    priceUsdSortIndicator.textContent = priceSortDirection === 'asc' ? '↑' : '↓';
  }

  function sortedRows(rows) {
    if (!priceSortDirection) {
      return rows;
    }

    const direction = priceSortDirection === 'asc' ? 1 : -1;
    return [...rows].sort((left, right) => {
      const leftPrice = left.priceUsdNumber;
      const rightPrice = right.priceUsdNumber;

      if (leftPrice === null && rightPrice === null) return 0;
      if (leftPrice === null) return 1;
      if (rightPrice === null) return -1;
      return (leftPrice - rightPrice) * direction;
    });
  }

  function letterSortValue(letter) {
    return letter;
  }

  function renderLetterNav() {
    const letters = [...new Set(currentResults.map(item => item.firstLetter).filter(letter => /^[A-Z]$/.test(letter)))]
      .sort((left, right) => letterSortValue(left).localeCompare(letterSortValue(right), 'en'));

    letterNav.innerHTML = '';
    letterNav.classList.toggle('is-visible', letters.length > 1 && !tableWrapper.classList.contains('is-hidden'));
    if (letters.length <= 1) return;

    const fragment = document.createDocumentFragment();
    letters.forEach(letter => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `letter-button${letter === activeLetter ? ' is-active' : ''}`;
      button.dataset.letter = letter;
      button.textContent = letter;
      button.title = `Перейти до ${letter}`;
      fragment.appendChild(button);
    });

    letterNav.appendChild(fragment);
  }

  function renderRowsUntil(index) {
    while (renderedCount <= index && renderedCount < currentResults.length) {
      renderNextRows();
    }
  }

  function mainLetterIndex(letter) {
    const maxGapInsideCluster = 2;
    let currentCluster = null;
    let bestCluster = null;

    currentResults.forEach((item, index) => {
      if (item.firstLetter !== letter) return;

      if (
        !currentCluster ||
        index - currentCluster.lastIndex > maxGapInsideCluster + 1
      ) {
        currentCluster = { startIndex: index, lastIndex: index, count: 1 };
      } else {
        currentCluster.lastIndex = index;
        currentCluster.count += 1;
      }

      if (
        !bestCluster ||
        currentCluster.count > bestCluster.count ||
        (
          currentCluster.count === bestCluster.count &&
          currentCluster.startIndex < bestCluster.startIndex
        )
      ) {
        bestCluster = { ...currentCluster };
      }
    });

    return bestCluster ? bestCluster.startIndex : -1;
  }

  function scrollToLetter(letter) {
    const index = mainLetterIndex(letter);
    if (index < 0) return;

    activeLetter = letter;
    renderRowsUntil(index);
    renderLetterNav();

    const row = document.getElementById(`row-${index}`);
    if (!row) return;

    const stickyOffset = document.querySelector('.sticky-toolbar').offsetHeight + 14;
    const top = row.getBoundingClientRect().top + window.scrollY - stickyOffset;
    window.scrollTo({ top: Math.max(top, 0), behavior: 'auto' });
  }

  function showTable() {
    tableStatus.classList.remove('is-visible', 'error', 'success');
    tableStatus.textContent = '';
    tableWrapper.classList.remove('is-hidden');
  }

  function appendRows(rows, startIndex) {
    if (!rows.length) return;

    const fragment = document.createDocumentFragment();

    rows.forEach((item, offset) => {
      const absoluteIndex = startIndex + offset;
      const row = document.createElement('tr');
      if (item.isNew) {
        row.classList.add('is-new-row');
      }
      row.id = `row-${absoluteIndex}`;
      row.dataset.copy = item.copyText;
      row.innerHTML = `
        <td class="code-cell">${highlight(item.code)}</td>
        <td class="code-cell">${highlight(item.barcode || '')}</td>
        <td class="name-cell">${highlight(item.name)}</td>
        <td>${highlight(item.tester || '')}</td>
        <td>${highlight(item.type || '')}</td>
        <td>${highlight(item.kind || '')}</td>
        <td>${highlight(item.volume || '')}</td>
        <td class="price-cell">${escapeHTML(item.priceUsd || '-')}</td>
        <td class="price-cell">${escapeHTML(item.priceUah || '-')}</td>
        <td><span class="delivery-pill">${escapeHTML(item.delivery)}</span></td>
      `;
      fragment.appendChild(row);
    });

    tableBody.appendChild(fragment);
  }

  function renderNextRows() {
    if (renderedCount >= currentResults.length) return;

    const startIndex = renderedCount;
    const nextRows = currentResults.slice(renderedCount, renderedCount + PAGE_SIZE);
    appendRows(nextRows, startIndex);
    renderedCount += nextRows.length;
  }

  function currentViewKey() {
    const query = normalize(searchInput.value);
    const searchKey = query.length >= MIN_SEARCH_LENGTH ? query : '';
    return [activeTab, searchKey, priceSortDirection || 'default'].join('|');
  }

  function saveScrollPosition() {
    if (!currentResults.length) return;

    scrollMemory.set(currentViewKey(), {
      scrollY: window.scrollY,
      renderedCount,
    });
  }

  function restoreScrollPosition() {
    const saved = shouldRestoreScroll ? scrollMemory.get(currentViewKey()) : null;
    shouldRestoreScroll = false;

    if (!saved) {
      const toolbarPinnedTop = getViewportTop();
      const tableTop = tableWrapper.getBoundingClientRect().top + window.scrollY;
      const toolbarHeight = stickyToolbar ? stickyToolbar.getBoundingClientRect().height : 0;
      const targetY = Math.max(0, tableTop - toolbarHeight - toolbarPinnedTop);
      window.scrollTo({ top: targetY, behavior: 'auto' });
      return;
    }

    const targetRenderedCount = Math.min(saved.renderedCount || PAGE_SIZE, currentResults.length);
    while (renderedCount < targetRenderedCount) {
      renderNextRows();
    }

    window.requestAnimationFrame(() => {
      window.scrollTo({ top: saved.scrollY || 0, behavior: 'auto' });
    });
  }

  function renderResults(rows) {
    tableBody.innerHTML = '';
    updateSortHeader();
    currentResults = sortedRows(rows);
    renderedCount = 0;
    activeLetter = '';

    if (!currentResults.length) {
      renderLetterNav();
      renderState(lastQuery ? 'За вашим запитом нічого не знайдено' : 'Немає позицій у цьому прайсі');
      updateStatus(currentResults);
      return;
    }

    showTable();
    renderNextRows();
    renderLetterNav();
    updateStatus(currentResults);
    restoreScrollPosition();
  }

  function rowsForActiveTab() {
    let rows = allRows;

    if (activeTab === 'new') {
      rows = rows.filter(item => item.isNew && NEW_TAB_SOURCE_IDS.has(item.sheetId));
    } else if (activeTab !== 'all') {
      rows = rows.filter(item => item.sheetId === activeTab);
    }

    if (lastQuery) {
      const words = uniqueWords(lastQuery);
      rows = rows.filter(item => words.every(word => item.searchText.includes(word)));
    }

    return rows;
  }

  function renderActiveTab() {
    const query = normalize(searchInput.value);
    const searchActive = query.length >= MIN_SEARCH_LENGTH;
    clearSearchBtn.style.display = searchInput.value.length ? 'flex' : 'none';

    if (searchActive && !wasSearchActive) {
      activeTab = 'all';
    } else if (!searchActive && wasSearchActive && activeTab === 'all') {
      activeTab = SHEETS[0].id;
    }

    wasSearchActive = searchActive;
    lastQuery = searchActive ? query : '';
    renderTabs();

    if (searchInput.value && !searchActive) {
      renderState('Введіть щонайменше 2 символи для пошуку');
      currentResults = [];
      renderedCount = 0;
      updateStatus([]);
      return;
    }

    renderResults(rowsForActiveTab());
  }

  function applySearch() {
    shouldRestoreScroll = false;
    renderActiveTab();
  }

  function debounce(fn, delay = 160) {
    let timer;
    return (...args) => {
      window.clearTimeout(timer);
      timer = window.setTimeout(() => fn(...args), delay);
    };
  }

  async function loadData() {
    renderTabs();
    renderState('Завантаження прайсу...');

    let payload;
    try {
      const response = await fetch(BUY_API_URL, {
        cache: 'no-store',
        credentials: 'include',
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error(`API returned ${response.status}`);
      }

      payload = await response.json();
    } catch (error) {
      console.error(error);
      updatedAt.textContent = 'Не завантажено';
      loadedCount.textContent = '0 / ' + SHEETS.length + ' прайсів';
      renderState('Не вдалося завантажити дані з API', 'error');
      return;
    }

    const sheetPayloads = Array.isArray(payload.sheets) ? payload.sheets : [];
    const payloadById = new Map(sheetPayloads.map(sheet => [sheet.id, sheet]));
    const loaded = SHEETS.map(sheet => {
      const apiSheet = payloadById.get(sheet.id);
      const rows = apiSheet ? apiRowsToRows(sheet, apiSheet.rows) : [];
      return { sheet, rows, error: !apiSheet || Boolean(apiSheet.error) };
    });

    allRows = loaded.flatMap(result => result.rows);
    availableSheets = loaded
      .filter(result => !result.error && result.rows.length)
      .map(result => ({ ...result.sheet, count: result.rows.length }));

    updatedAt.textContent = payload.updatedAt || 'Не завантажено';

    if (!allRows.length) {
      loadedCount.textContent = '0 / ' + SHEETS.length + ' прайсів';
      renderState('Не вдалося завантажити дані з API', 'error');
      return;
    }

    if (availableSheets.length !== SHEETS.length) {
      const loadedIds = new Set(availableSheets.map(sheet => sheet.id));
      const missing = SHEETS.filter(sheet => !loadedIds.has(sheet.id)).map(sheet => sheet.sheetName).join(', ');
      renderState(`Помилка оновлення: не завантажено прайси ${missing}`, 'error');
      return;
    }

    renderActiveTab();
  }

  sheetTabs.addEventListener('click', event => {
    const button = event.target.closest('.sheet-tab');
    if (!button) return;
    saveScrollPosition();
    activeTab = button.dataset.tab;
    shouldRestoreScroll = true;
    renderActiveTab();
  });

  priceUsdHeader.addEventListener('click', () => {
    saveScrollPosition();
    if (priceSortDirection === null) {
      priceSortDirection = 'asc';
    } else if (priceSortDirection === 'asc') {
      priceSortDirection = 'desc';
    } else {
      priceSortDirection = null;
    }
    shouldRestoreScroll = false;
    renderActiveTab();
  });

  letterNav.addEventListener('click', event => {
    const button = event.target.closest('.letter-button');
    if (!button) return;
    scrollToLetter(button.dataset.letter);
  });

  searchInput.addEventListener('input', debounce(applySearch, 320));
  clearSearchBtn.addEventListener('click', () => {
    saveScrollPosition();
    searchInput.value = '';
    shouldRestoreScroll = false;
    applySearch();
    searchInput.focus();
  });

  window.addEventListener('scroll', () => {
    saveScrollPosition();

    if (!currentResults.length || renderedCount >= currentResults.length) return;

    const distanceToBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
    if (distanceToBottom < 700) {
      renderNextRows();
    }
  });

  tableBody.addEventListener('click', async event => {
    const row = event.target.closest('tr');
    if (!row || !row.dataset.copy) return;

    tableBody.querySelectorAll('tr').forEach(item => item.classList.remove('selected-row'));
    row.classList.add('selected-row');

    try {
      await navigator.clipboard.writeText(row.dataset.copy);
    } catch (error) {
      const textArea = document.createElement('textarea');
      textArea.value = row.dataset.copy;
      textArea.style.position = 'fixed';
      textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      document.execCommand('copy');
      textArea.remove();
    }
  });

  loadData();
});
</script>
</body>
</html>
